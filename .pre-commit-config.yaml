repos:
  - repo: local
    hooks:
      - id: oxfmt
        name: oxfmt (format)
        entry: pnpm exec oxfmt
        language: system
        files: \.(vue|ts|tsx|js|jsx|mjs|cjs|json|jsonc|css|scss|less|md|mdx|ya?ml)$
        exclude: (^pnpm-lock\.yaml$|^dist/|^\.nitro/)
      - id: oxlint
        name: oxlint (--fix)
        entry: pnpm exec oxlint --fix
        language: system
        files: \.(vue|ts|tsx|js|jsx|mjs|cjs)$
        pass_filenames: false
