name: Deploy to GitHub Pages
on:
  workflow_dispatch:
  push:
    branches:
      - main

# Cancel in-flight runs for the same ref so rapid pushes to main don't pile up
# (only the latest push deploys). Scoped per-ref so concurrent branches never
# block each other.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-plugin-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Upload workspace
        uses: actions/upload-artifact@v7
        with:
          name: workspace-with-plugins
          path: .

  # Quality gate: format, lint, and full test suite must pass before build.
  # Runs in parallel with prepare-plugin-data; build waits on both.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Format check
        run: pnpm format:check
      - name: Lint
        run: pnpm lint:check
      - name: Tests (unit + nuxt)
        run: pnpm test-all
        env:
          # @nuxt/content clones plugin-registry; auth raises the rate limit
          # from ~60/h to 5000/h (same pattern as the build job).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: [prepare-plugin-data, verify]
    runs-on: ubuntu-latest
    steps:
      - name: Download workspace
        uses: actions/download-artifact@v8
        with:
          name: workspace-with-plugins
          path: .

      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      # Pick your own package manager and build script
      - run: pnpm install --frozen-lockfile
      - name: Update stats
        run: pnpm run update-stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: pnpm run generate-github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GitHub Pages project site is served under /<repo>/. Drop this once the
          # site moves to a root domain.
          NUXT_APP_BASE_URL: /litestar.dev-v2/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./.output/public
  # Deployment job
  deploy:
    # Add a dependency to the build job
    needs: build
    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
